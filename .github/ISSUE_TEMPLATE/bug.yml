name: Bug report
description: Report incorrect, surprising, or broken behaviour in rustyroute.
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough
        detail for maintainers to reproduce the problem.
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behaviour
      description: What happened?
      placeholder: Describe the behaviour you observed.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
      placeholder: Describe the behaviour you expected.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps, code, or commands to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Rust toolchain version, OS, target triple, and crate version or commit SHA.
      placeholder: |
        rustc --version:
        cargo --version:
        OS:
        Target:
        rustyroute version/commit:
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Logs, links, screenshots, or other relevant notes.
    validations:
      required: false
