name: "ci"

# Lint + test gate for every PR and push to main. Mirrors clickup.yaml's
# lowercase-name + .yaml-extension conventions. Inlined (no reusable
# workflow) because rustyroute is public and spotship/.github's shared
# workflows are private-scoped — see .github/workflows/clickup.yaml
# header for the same rationale.

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings
